<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORDRY Store</title>
  <style>
    body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;padding:30px}
    h1{text-align:center}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:30px}
    .card{background:#111;border:1px solid #222;border-radius:16px;padding:20px}
    img{width:100%;height:180px;object-fit:cover;border-radius:12px;background:#1a1a1a}
    input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px}
    button{padding:12px 16px;background:#fff;color:#000;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
  </style>
</head>
<body>
  <h1 id="storeName">Store</h1>
  <div class="grid" id="storeProducts"></div>

  <script>
    const user = JSON.parse(localStorage.getItem("ordryUser"));

    if (!user) {
      document.body.innerHTML = "<h1 style='color:white;text-align:center'>No store found</h1>";
    } else {
      document.getElementById("storeName").innerText = user.name || "Store";

      const storeProducts = document.getElementById("storeProducts");

      if (!user.products || user.products.length === 0) {
        storeProducts.innerHTML = "<p>No products available.</p>";
      } else {
        user.products.forEach((product, index) => {
          storeProducts.innerHTML += `
            <div class="card">
              <img src="${product.image || 'https://via.placeholder.com/400x300?text=ORDRY'}" alt="${product.name}">
              <h3>${product.name}</h3>
              <p>${product.price} AED</p>
              <input type="text" id="customerName${index}" placeholder="Your Name">
              <input type="text" id="phone${index}" placeholder="Phone Number">
              <button onclick="placeOrder(${index})">Order Now</button>
            </div>
          `;
        });
      }
    }

    function placeOrder(index) {
      const name = document.getElementById("customerName" + index).value;
      const phone = document.getElementById("phone" + index).value;

      if (!name || !phone) {
        alert("Enter your name and phone");
        return;
      }

      const product = user.products[index];

      if (!user.orders) user.orders = [];

      user.orders.push({
        productName: product.name,
        customerName: name,
        phone: phone,
        status: "New"
      });

      localStorage.setItem("ordryUser", JSON.stringify(user));
      alert("Order placed successfully ✅");
    }
  </script>
</body>
</html>
